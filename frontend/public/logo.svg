<svg width="240" height="64" viewBox="0 0 240 64" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Icon mark: blue rounded square with graduation cap -->
  <rect x="0" y="0" width="64" height="64" rx="14" fill="#3b82f6"/>
  <!-- Graduation cap diamond -->
  <polygon points="32,13 48,22 32,31 16,22" fill="white"/>
  <!-- Tassel string + ball -->
  <line x1="48" y1="22" x2="48" y2="33" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
  <circle cx="48" cy="36" r="3" fill="white"/>
  <!-- Cap body sides -->
  <path d="M18 24 L18 33 C18 38 24 42 32 42 C40 42 46 38 46 33 L46 24"
